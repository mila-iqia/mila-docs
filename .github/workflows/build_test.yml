---
name: build_test

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pull-requests: write # Required for commenting on PRs

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          # https://github.com/astral-sh/setup-uv?tab=readme-ov-file#github-authentication-token
          github-token: ${{ secrets.GITHUB_TOKEN }}
          python-version: 3.13

      - name: Install MkDocs and dependencies
        run: uv sync --no-dev

      - name: Generate diff files
        run: uv run --script docs/examples/preprocess.py

      - name: Toggle skip error checks on generate_diffs.sh
        run: ./docs/examples/toggle_skip_generate_diffs_err_check.sh
        shell: bash

      - name: Build MkDocs site
        run: uv run mkdocs build --site-dir ./_build/html

      - name: Save artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: docs-build-test
          path: ./_build/html

  test-mila-docs:
    name: Evaluate the usefulness of the docs using DocMetrics
    runs-on: self-hosted
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          python-version: 3.13
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Serve PR docs in background
        run: |
          uv run mkdocs serve &
          echo $! > /tmp/docs_server.pid

      - name: Wait for docs server to be ready
        run: |
          for i in {1..10}; do
            if curl -s http://localhost:8000/ > /dev/null; then
              echo "Docs server is ready"
              exit 0
            fi
            echo "Waiting for docs server... attempt $i"
            sleep 1
          done
          echo "Docs server failed to start"
          exit 1

      - name: Run DocMetrics action on docmetrics docs
        uses: mila-iqia/docmetrics@v0.0.3
        with:
          questions-file: quiz.yaml
          docs-url: http://localhost:8000
          base-docs-url: https://docs.mila.quebec
          model: gpt-oss:120b
          ollama-url: dgx:11434
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Stop docs server
        if: always()
        run: |
          if [ -f /tmp/docs_server.pid ]; then
            kill $(cat /tmp/docs_server.pid) || true
          fi
